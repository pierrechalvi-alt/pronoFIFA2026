<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0c59cf" />
  <meta name="fwc26-canonical-origin" content="" />
  <meta name="fwc26-community-api" content="" />
  <meta name="fwc26-disable-canonical-redirect" content="" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Pronos Coupe du Monde 2026</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./assets/icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="bg-orb orb3"></div>

  <header class="topbar">
    <div class="brand">
      <div class="logo-wordmark">PRONOS COUPE DU MONDE <span>2026</span></div>
    </div>
    <div class="userbox" id="userBox"></div>
  </header>

  <main class="container" id="app"></main>

  <footer class="footer">
    <span>⚽ 104 matchs, 0 excuse.</span>
    <span class="sep">•</span>
    <span>Vivement le coup de sifflet final, qu'on célèbre tous ensemble.</span>
  </footer>

  <script src="./runtime-config.js"></script>
  <script>
    window.__FWC26_BOOT_STATUS__ = { ready: false, errors: [] };
    window.addEventListener("error", (event) => {
      const message = event?.error?.stack || event?.message || "Erreur JavaScript inconnue";
      window.__FWC26_BOOT_STATUS__.errors.push(`error: ${message}`);
    });
    window.addEventListener("unhandledrejection", (event) => {
      const reason = event?.reason?.stack || event?.reason?.message || String(event?.reason || "Promesse rejetée inconnue");
      window.__FWC26_BOOT_STATUS__.errors.push(`unhandledrejection: ${reason}`);
    });
    setTimeout(async () => {
      if (window.__FWC26_BOOT_STATUS__?.ready) return;
      const appRoot = document.getElementById("app");
      if (!appRoot) return;
      const targets = [
        "./app.js",
        "./styles.css",
        "./data/teams.json",
        "./data/matches.json"
      ];
      const checks = await Promise.all(targets.map(async (url) => {
        try {
          const response = await fetch(url, { method: "GET", cache: "no-store" });
          return `${url} → HTTP ${response.status}`;
        } catch (err) {
          return `${url} → erreur réseau (${err?.message || "inconnue"})`;
        }
      }));
      appRoot.innerHTML = `
        <section class="card">
          <h1>Chargement incomplet de l'application</h1>
          <p>Le HTML est bien chargé, mais le script principal ne s'est pas initialisé correctement.</p>
          <p>Vérifie les statuts ci-dessous puis recharge la page (Ctrl/Cmd + Shift + R).</p>
          <h3>Erreurs JavaScript détectées</h3>
          <pre style="white-space:pre-wrap">${(window.__FWC26_BOOT_STATUS__?.errors || []).join("\n") || "Aucune erreur capturée (ouvrir la console navigateur)."}</pre>
          <h3>Statut des ressources</h3>
          <pre style="white-space:pre-wrap">${checks.join("\n")}</pre>
        </section>
      `;
    }, 2800);
  </script>
  <script type="module" src="./app.js"></script>
</body>
</html>
